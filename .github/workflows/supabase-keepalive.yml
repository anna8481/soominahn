name: Supabase Keep-Alive

on:
  schedule:
    # 매일 UTC 03:00 (KST 12:00) 실행
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -fsS \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/artworks?select=id&limit=1" \
            > /dev/null
